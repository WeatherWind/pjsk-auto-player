name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pjsk-auto-player-linux
            asset_name: pjsk-auto-player-linux-x86_64
          - os: macos-latest
            artifact_name: pjsk-auto-player-macos
            asset_name: pjsk-auto-player-macos-universal
          - os: windows-latest
            artifact_name: pjsk-auto-player.exe
            asset_name: pjsk-auto-player-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller opencv-python-headless numpy pyyaml

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.artifact_name }}" \
            --add-data "tasks:tasks" \
            --add-data "templates:templates" \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import yaml \
            --hidden-import pipeline \
            --hidden-import adb_controller \
            --hidden-import screen_analyzer \
            --hidden-import auto_play \
            --hidden-import ocr_reader \
            --hidden-import web_dashboard \
            --hidden-import scene_classifier \
            --hidden-import capture_optimizer \
            --hidden-import setup_wizard \
            --exclude-module tkinter \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module PIL \
            --exclude-module pandas \
            --exclude-module torch \
            --console \
            main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 1  # 只需保留到 release 步骤

  # ── 每次 push 到 main: 发布到 Releases ──
  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有 tag 用于生成 changelog

      - uses: actions/download-artifact@v4
        with:
          pattern: pjsk-auto-player-*
          merge-multiple: true

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            # 每次 push 到 main: 用日期+短SHA作为tag
            TAG="continuous-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=PJSK Auto Player $TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # 版本发布: 生成从上一个 tag 到当前的 changelog
            PREV=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
            if [ -n "$PREV" ]; then
              echo "## Changes since $PREV" > /tmp/release_notes.md
              git log --oneline --no-decorate "$PREV..HEAD" >> /tmp/release_notes.md
            else
              echo "Initial release" > /tmp/release_notes.md
            fi
          else
            # 持续构建: 显示最近 commits
            echo "## Continuous Build" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            echo "Commit: ${GITHUB_SHA::7}" >> /tmp/release_notes.md
            echo "Branch: ${{ github.ref_name }}" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            echo "### Recent commits" >> /tmp/release_notes.md
            git log --oneline --no-decorate -10 "origin/main" 2>/dev/null >> /tmp/release_notes.md
          fi
          echo "file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.release_name }}
          bodyFile: /tmp/release_notes.md
          artifacts: |
            pjsk-auto-player-linux-x86_64
            pjsk-auto-player-macos-universal
            pjsk-auto-player-windows-x86_64.exe
          allowUpdates: true
          makeLatest: ${{ startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
