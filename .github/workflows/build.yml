name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pjsk-auto-player-linux
            asset_name: pjsk-auto-player-linux-x86_64
          - os: macos-latest
            artifact_name: pjsk-auto-player-macos
            asset_name: pjsk-auto-player-macos-universal
          - os: windows-latest
            artifact_name: pjsk-auto-player.exe
            asset_name: pjsk-auto-player-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller opencv-python-headless numpy pyyaml

      - name: Pre-download minitouch binaries
        run: |
          bash scripts/download_minitouch.sh

      - name: Build with PyInstaller
        run: |
          # 打包 README / TERMS / CHANGELOG / VERSION / minitouch 到可执行文件中
          pyinstaller \
            --onefile \
            --name "${{ matrix.artifact_name }}" \
            --add-data "tasks:tasks" \
            --add-data "templates:templates" \
            --add-data "bin:bin" \
            --add-data "README.md:." \
            --add-data "TERMS.md:." \
            --add-data "CHANGELOG.md:." \
            --add-data "VERSION:." \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import yaml \
            --hidden-import pipeline \
            --hidden-import adb_controller \
            --hidden-import screen_analyzer \
            --hidden-import auto_play \
            --hidden-import ocr_reader \
            --hidden-import web_dashboard \
            --hidden-import scene_classifier \
            --hidden-import capture_optimizer \
            --hidden-import setup_wizard \
            --hidden-import scrcpy_controller \
            --exclude-module tkinter \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module PIL \
            --exclude-module pandas \
            --exclude-module torch \
            --console \
            main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 1

  # ── Release: 每次 push 到 main 都发布 ──
  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: pjsk-auto-player-*
          merge-multiple: true

      - name: Bundle legal docs with release
        run: |
          cp README.md TERMS.md CHANGELOG.md VERSION .

      - name: Determine release tag
        id: tag
        run: |
          VERSION=$(cat VERSION)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            # 持续构建: 用版本号+日期
            TAG="continuous-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=PJSK Auto Player v${VERSION} ($TAG)" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          python3 scripts/gen_release_notes.py
          echo "file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.release_name }}
          bodyFile: /tmp/release_notes.md
          artifacts: |
            pjsk-auto-player-linux-x86_64
            pjsk-auto-player-macos-universal
            pjsk-auto-player-windows-x86_64.exe
            README.md
            TERMS.md
            CHANGELOG.md
            VERSION
          allowUpdates: true
          makeLatest: ${{ startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
