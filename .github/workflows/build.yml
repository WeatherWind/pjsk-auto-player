name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pjsk-auto-player-linux
            asset_name: pjsk-auto-player-linux-x86_64
          - os: macos-latest
            artifact_name: pjsk-auto-player-macos
            asset_name: pjsk-auto-player-macos-universal
          - os: windows-latest
            artifact_name: pjsk-auto-player.exe
            asset_name: pjsk-auto-player-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python-headless numpy pyyaml

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.artifact_name }}" \
            --add-data "tasks:tasks" \
            --add-data "templates:templates" \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import yaml \
            --hidden-import pipeline \
            --hidden-import adb_controller \
            --hidden-import screen_analyzer \
            --hidden-import auto_play \
            --hidden-import ocr_reader \
            --hidden-import web_dashboard \
            --exclude-module tkinter \
            --exclude-module matplotlib \
            --exclude-module scipy \
            --exclude-module PIL \
            --exclude-module pandas \
            --exclude-module torch \
            --console \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pjsk-auto-player-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pjsk-auto-player-linux-x86_64
            pjsk-auto-player-macos-universal
            pjsk-auto-player-windows-x86_64.exe
          generate_release_notes: true
          make_latest: true
